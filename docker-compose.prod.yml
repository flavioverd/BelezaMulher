# Docker Compose - Produção
# BelezaMulher E-commerce

version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: belezamulher_backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: belezamulher
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_IN: 24h
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    networks:
      - belezamulher_network
    restart: unless-stopped

  # Frontend Web
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: belezamulher_web
    environment:
      REACT_APP_API_URL: http://localhost:3000
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - belezamulher_network
    restart: unless-stopped

  # Banco de dados PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: belezamulher_postgres
    environment:
      POSTGRES_DB: belezamulher
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - belezamulher_network
    restart: unless-stopped

  # Nginx como proxy reverso (opcional)
  nginx:
    image: nginx:alpine
    container_name: belezamulher_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - web
    networks:
      - belezamulher_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  belezamulher_network:
    driver: bridge